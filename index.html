<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neon Tetris</title>
  <style>
    :root {
      --bg: #050816;
      --panel: #0b1020;
      --accent: #ff6bcb;
      --accent2: #00f5ff;
      --grid: #1b2340;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1a2a6c, #050816 55%, #000 100%);
      color: #f8f9ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .glow-orbit {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,255,0.18), transparent 60%);
      filter: blur(2px);
      top: -150px;
      right: -120px;
      pointer-events: none;
      animation: float 18s ease-in-out infinite alternate;
      opacity: 0.9;
    }

    .glow-orbit:nth-child(2) {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,107,203,0.22), transparent 60%);
      top: auto;
      bottom: -160px;
      left: -120px;
      animation-duration: 22s;
    }

    @keyframes float {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(-40px, 40px, 0) scale(1.08); }
    }

    .frame {
      position: relative;
      display: flex;
      gap: 24px;
      padding: 24px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 24px 60px rgba(0,0,0,0.9);
      backdrop-filter: blur(18px);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(0,245,255,0.6), rgba(255,107,203,0.6));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.7;
      pointer-events: none;
    }

    .left-panel {
      background: radial-gradient(circle at top, #151b3a, #050816 70%);
      border-radius: 18px;
      padding: 16px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      position: relative;
    }

    .left-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image: linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
                        linear-gradient(180deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 16px 16px;
      opacity: 0.35;
      pointer-events: none;
    }

    canvas#board {
      display: block;
      background: radial-gradient(circle at top, #11172f, #050816 70%);
      border-radius: 12px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 18px 40px rgba(0,0,0,0.9);
    }

    .right-panel {
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .title {
      font-size: 24px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title span {
      font-weight: 700;
    }

    .title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent2), transparent 70%);
      box-shadow: 0 0 12px var(--accent2);
    }

    .subtitle {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a5b4fc;
      opacity: 0.9;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card {
      background: radial-gradient(circle at top, #151b3a, #050816 80%);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #e5e7eb;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg, rgba(0,245,255,0.18), transparent, rgba(255,107,203,0.18), transparent);
      opacity: 0.35;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .panel-block {
      background: radial-gradient(circle at top, #151b3a, #050816 80%);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      position: relative;
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #9ca3af;
    }

    .pill {
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      border: 1px solid rgba(148,163,184,0.6);
      color: #e5e7eb;
    }

    canvas#next {
      display: block;
      background: radial-gradient(circle at top, #11172f, #050816 80%);
      border-radius: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      font-size: 11px;
      color: #d1d5db;
    }

    .controls span {
      color: #a5b4fc;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      display: inline-block;
      margin-bottom: 2px;
    }

    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid rgba(148,163,184,0.7);
      font-size: 10px;
      margin-right: 4px;
      background: rgba(15,23,42,0.8);
    }

    .primary-button {
      margin-top: 4px;
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #050816;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow:
        0 0 18px rgba(0,245,255,0.6),
        0 0 26px rgba(255,107,203,0.6);
      transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    }

    .primary-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .primary-button:active {
      transform: translateY(1px) scale(0.99);
      box-shadow:
        0 0 10px rgba(0,245,255,0.4),
        0 0 16px rgba(255,107,203,0.4);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #22c55e, transparent 70%);
      box-shadow: 0 0 10px #22c55e;
    }

    .status-dot.paused {
      background: radial-gradient(circle, #f97316, transparent 70%);
      box-shadow: 0 0 10px #f97316;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .overlay-message {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(15,23,42,0.92);
      border: 1px solid rgba(148,163,184,0.7);
      box-shadow: 0 18px 40px rgba(0,0,0,0.9);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(10px);
    }

    .overlay-message span {
      color: #a5b4fc;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      body {
        padding: 16px;
      }
      .frame {
        flex-direction: column;
      }
      .right-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="glow-orbit"></div>
  <div class="glow-orbit"></div>

  <div class="frame">
    <div class="left-panel">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="overlay hidden" id="overlay">
        <div class="overlay-message" id="overlayMessage">
          <span>Press</span> ENTER <span>to start</span>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div>
        <div class="title">
          <div class="dot"></div>
          <span>NEON TETRIS</span>
        </div>
        <div class="subtitle">Stack, clear, ascend</div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Lines</div>
          <div class="stat-value" id="lines">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Level</div>
          <div class="stat-value" id="level">1</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Speed</div>
          <div class="stat-value" id="speed">1.00x</div>
        </div>
      </div>

      <div class="panel-block">
        <div class="panel-header">
          <span>Next piece</span>
          <div class="pill">Preview</div>
        </div>
        <canvas id="next" width="120" height="120"></canvas>
      </div>

      <div class="panel-block">
        <div class="panel-header">
          <span>Controls</span>
          <div class="pill">Keyboard</div>
        </div>
        <div class="controls">
          <div>
            <span>Move</span><br />
            <span class="key">←</span><span class="key">→</span>
          </div>
          <div>
            <span>Rotate</span><br />
            <span class="key">↑</span>
          </div>
          <div>
            <span>Soft drop</span><br />
            <span class="key">↓</span>
          </div>
          <div>
            <span>Hard drop</span><br />
            <span class="key">Space</span>
          </div>
          <div>
            <span>Pause</span><br />
            <span class="key">P</span>
          </div>
          <div>
            <span>Start</span><br />
            <span class="key">Enter</span>
          </div>
        </div>
        <button class="primary-button" id="startBtn">Start / Restart</button>
        <div class="status-bar">
          <div>
            Status:
            <strong id="statusText">Idle</strong>
          </div>
          <div class="status-dot" id="statusDot"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const boardCanvas = document.getElementById("board");
    const boardCtx = boardCanvas.getContext("2d");
    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const linesEl = document.getElementById("lines");
    const levelEl = document.getElementById("level");
    const speedEl = document.getElementById("speed");
    const statusText = document.getElementById("statusText");
    const statusDot = document.getElementById("statusDot");
    const overlay = document.getElementById("overlay");
    const overlayMessage = document.getElementById("overlayMessage");
    const startBtn = document.getElementById("startBtn");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 24;

    boardCtx.scale(BLOCK_SIZE, BLOCK_SIZE);

    const COLORS = {
      0: null,
      1: "#00f5ff",
      2: "#ff6bcb",
      3: "#7c3aed",
      4: "#22c55e",
      5: "#facc15",
      6: "#fb923c",
      7: "#38bdf8",
    };

    const PIECES = "IJLOSTZ";

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) matrix.push(new Array(w).fill(0));
      return matrix;
    }

    function createPiece(type) {
      switch (type) {
        case "T":
          return [
            [0, 0, 0],
            [1, 1, 1],
            [0, 1, 0],
          ];
        case "O":
          return [
            [2, 2],
            [2, 2],
          ];
        case "L":
          return [
            [0, 3, 0],
            [0, 3, 0],
            [0, 3, 3],
          ];
        case "J":
          return [
            [0, 4, 0],
            [0, 4, 0],
            [4, 4, 0],
          ];
        case "I":
          return [
            [0, 5, 0, 0],
            [0, 5, 0, 0],
            [0, 5, 0, 0],
            [0, 5, 0, 0],
          ];
        case "S":
          return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
          ];
        case "Z":
          return [
            [7, 7, 0],
            [0, 7, 7],
            [0, 0, 0],
          ];
      }
    }

    const arena = createMatrix(COLS, ROWS);

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null,
      next: null,
      score: 0,
      lines: 0,
      level: 1,
    };

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let running = false;
    let paused = false;

    function resetArena() {
      for (let y = 0; y < arena.length; y++) {
        arena[y].fill(0);
      }
    }

    function collide(arena, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (
            m[y][x] !== 0 &&
            (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0
          ) {
            return true;
          }
        }
      }
      return false;
    }

    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function arenaSweep() {
      let rowCount = 1;
      for (let y = arena.length - 1; y >= 0; --y) {
        let full = true;
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) {
            full = false;
            break;
          }
        }
        if (full) {
          const row = arena.splice(y, 1)[0].fill(0);
          arena.unshift(row);
          ++y;
          player.score += rowCount * 100;
          player.lines += 1;
          rowCount *= 2;
        }
      }
      player.level = 1 + Math.floor(player.lines / 10);
      updateSpeed();
      updateUI();
    }

    function rotate(matrix, dir) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) {
        matrix.forEach((row) => row.reverse());
      } else {
        matrix.reverse();
      }
    }

    function playerRotate(dir) {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix, dir);
      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -dir);
          player.pos.x = pos;
          return;
        }
      }
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        arenaSweep();
        playerReset();
      }
      dropCounter = 0;
    }

    function playerHardDrop() {
      while (!collide(arena, player)) {
        player.pos.y++;
      }
      player.pos.y--;
      merge(arena, player);
      arenaSweep();
      playerReset();
      dropCounter = 0;
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function randomPiece() {
      const type = PIECES[(PIECES.length * Math.random()) | 0];
      return createPiece(type);
    }

    function playerReset() {
      if (!player.next) {
        player.next = randomPiece();
      }
      player.matrix = player.next;
      player.next = randomPiece();
      player.pos.y = 0;
      player.pos.x =
        ((arena[0].length / 2) | 0) - ((player.matrix[0].length / 2) | 0);

      if (collide(arena, player)) {
        running = false;
        paused = false;
        showOverlay("Game over · Press ENTER to restart");
        statusText.textContent = "Game over";
        statusDot.classList.add("paused");
      }
      drawNext();
    }

    function drawCell(ctx, x, y, value, ghost = false) {
      if (!value) return;
      const color = COLORS[value];
      const gx = x;
      const gy = y;

      ctx.save();
      ctx.translate(gx, gy);

      const gradient = ctx.createLinearGradient(0, 0, 1, 1);
      gradient.addColorStop(0, ghost ? "rgba(148,163,184,0.35)" : "#ffffff");
      gradient.addColorStop(1, ghost ? "rgba(148,163,184,0.05)" : color);

      ctx.fillStyle = gradient;
      ctx.fillRect(0.06, 0.06, 0.88, 0.88);

      ctx.strokeStyle = ghost ? "rgba(148,163,184,0.4)" : "rgba(15,23,42,0.9)";
      ctx.lineWidth = 0.06;
      ctx.strokeRect(0.06, 0.06, 0.88, 0.88);

      if (!ghost) {
        ctx.shadowColor = color;
        ctx.shadowBlur = 0.6;
        ctx.strokeStyle = "rgba(15,23,42,0.4)";
        ctx.strokeRect(0.06, 0.06, 0.88, 0.88);
      }

      ctx.restore();
    }

    function getGhostPosition() {
      const ghost = {
        pos: { x: player.pos.x, y: player.pos.y },
        matrix: player.matrix,
      };
      while (!collide(arena, ghost)) {
        ghost.pos.y++;
      }
      ghost.pos.y--;
      return ghost.pos;
    }

    function drawBoard() {
      boardCtx.save();
      boardCtx.setTransform(BLOCK_SIZE, 0, 0, BLOCK_SIZE, 0, 0);

      boardCtx.fillStyle = "#050816";
      boardCtx.fillRect(0, 0, COLS, ROWS);

      boardCtx.strokeStyle = "rgba(148,163,184,0.18)";
      boardCtx.lineWidth = 0.02;
      for (let x = 0; x < COLS; x++) {
        for (let y = 0; y < ROWS; y++) {
          boardCtx.strokeRect(x, y, 1, 1);
        }
      }

      for (let y = 0; y < arena.length; y++) {
        for (let x = 0; x < arena[y].length; x++) {
          const value = arena[y][x];
          if (value !== 0) {
            drawCell(boardCtx, x, y, value, false);
          }
        }
      }

      if (running && !paused && player.matrix) {
        const ghostPos = getGhostPosition();
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              drawCell(
                boardCtx,
                x + ghostPos.x,
                y + ghostPos.y,
                value,
                true
              );
            }
          });
        });
      }

      if (player.matrix) {
        player.matrix.forEach((row, y) => {
          row.forEach((value, x) => {
            if (value !== 0) {
              drawCell(
                boardCtx,
                x + player.pos.x,
                y + player.pos.y,
                value,
                false
              );
            }
          });
        });
      }

      boardCtx.restore();
    }

    function drawNext() {
      nextCtx.save();
      nextCtx.setTransform(1, 0, 0, 1, 0, 0);
      nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);

      nextCtx.fillStyle = "#050816";
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

      if (!player.next) {
        nextCtx.restore();
        return;
      }

      const matrix = player.next;
      const size = matrix.length;
      const scale = 20;
      const offsetX = (nextCanvas.width / 2 - (size * scale) / 2) / scale;
      const offsetY = (nextCanvas.height / 2 - (size * scale) / 2) / scale;

      nextCtx.scale(scale, scale);

      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            drawCell(nextCtx, x + offsetX, y + offsetY, value, false);
          }
        });
      });

      nextCtx.restore();
    }

    function updateSpeed() {
      dropInterval = Math.max(120, 1000 - (player.level - 1) * 80);
      const speedFactor = (1000 / dropInterval).toFixed(2);
      speedEl.textContent = speedFactor + "x";
    }

    function updateUI() {
      scoreEl.textContent = player.score;
      linesEl.textContent = player.lines;
      levelEl.textContent = player.level;
    }

    function update(time = 0) {
      if (!running) return;

      const deltaTime = time - lastTime;
      lastTime = time;

      if (!paused) {
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
          playerDrop();
        }
      }

      drawBoard();
      requestAnimationFrame(update);
    }

    function showOverlay(message) {
      overlay.classList.remove("hidden");
      overlayMessage.textContent = message;
    }

    function hideOverlay() {
      overlay.classList.add("hidden");
    }

    function startGame() {
      resetArena();
      player.score = 0;
      player.lines = 0;
      player.level = 1;
      updateSpeed();
      updateUI();
      player.next = null;
      playerReset();
      running = true;
      paused = false;
      hideOverlay();
      statusText.textContent = "Playing";
      statusDot.classList.remove("paused");
      lastTime = 0;
      dropCounter = 0;
      update();
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      if (paused) {
        statusText.textContent = "Paused";
        statusDot.classList.add("paused");
        showOverlay("Paused · Press P to resume");
      } else {
        statusText.textContent = "Playing";
        statusDot.classList.remove("paused");
        hideOverlay();
        lastTime = performance.now();
        update(lastTime);
      }
    }

    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startGame();
        return;
      }
      if (!running) return;

      switch (event.key) {
        case "ArrowLeft":
          if (!paused) playerMove(-1);
          break;
        case "ArrowRight":
          if (!paused) playerMove(1);
          break;
        case "ArrowDown":
          if (!paused) playerDrop();
          break;
        case "ArrowUp":
          if (!paused) playerRotate(1);
          break;
        case " ":
          event.preventDefault();
          if (!paused) playerHardDrop();
          break;
        case "p":
        case "P":
          togglePause();
          break;
      }
    });

    startBtn.addEventListener("click", () => {
      startGame();
    });

    showOverlay("Press ENTER to start");
    drawBoard();
    drawNext();
  </script>
</body>
</html>
