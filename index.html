<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Mobile Tetris</title>

<style>
    body {
        margin: 0;
        background: #0a0f1f;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 10px;
        color: white;
        overflow: hidden;
    }

    .game {
        width: 100%;
        max-width: 380px;
        text-align: center;
    }

    #board {
        width: 100%;
        height: auto;
        background: #11172f;
        border-radius: 12px;
        box-shadow: 0 0 20px #00eaff88;
        touch-action: none;
    }

    #overlay {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.7);
        padding: 14px 20px;
        border-radius: 12px;
        font-size: 20px;
        display: none;
    }

    .stats {
        margin-top: 10px;
        font-size: 20px;
    }

    .controls {
        margin-top: 15px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    .btn {
        padding: 16px 0;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 12px;
        font-size: 22px;
        user-select: none;
    }

    .btn:active {
        background: rgba(255,255,255,0.25);
    }
</style>
</head>

<body>

<div class="game">
    <canvas id="board" width="200" height="400"></canvas>
    <div id="overlay">Tap to Start</div>

    <div class="stats">
        <span id="score">0</span> pts
    </div>

    <div class="controls">
        <div class="btn" id="left">←</div>
        <div class="btn" id="rotate">⟳</div>
        <div class="btn" id="right">→</div>
        <div class="btn" id="down">↓</div>
        <div class="btn" id="drop">⤓</div>
        <div class="btn" id="pause">⏸</div>
    </div>
</div>

<script>
/* -------------------------
   MOBILE TETRIS ENGINE
--------------------------*/

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
ctx.scale(20, 20);

const overlay = document.getElementById("overlay");
const scoreEl = document.getElementById("score");

let running = false;
let paused = false;

const COLS = 10;
const ROWS = 20;

const COLORS = {
    1: "#00eaff",
    2: "#ff6bcb",
    3: "#7c3aed",
    4: "#22c55e",
    5: "#facc15",
    6: "#fb923c",
    7: "#38bdf8"
};

const PIECES = "IJLOSTZ";

function createMatrix(w, h) {
    const m = [];
    while (h--) m.push(new Array(w).fill(0));
    return m;
}

function createPiece(type) {
    switch (type) {
        case "T": return [[0,0,0],[1,1,1],[0,1,0]];
        case "O": return [[2,2],[2,2]];
        case "L": return [[0,3,0],[0,3,0],[0,3,3]];
        case "J": return [[0,4,0],[0,4,0],[4,4,0]];
        case "I": return [[5,5,5,5]];
        case "S": return [[0,6,6],[6,6,0],[0,0,0]];
        case "Z": return [[7,7,0],[0,7,7],[0,0,0]];
    }
}

const arena = createMatrix(COLS, ROWS);

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0
};

function collide(arena, player) {
    const m = player.matrix;
    const o = player.pos;
    for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
            if (m[y][x] !== 0 &&
                (arena[y + o.y] &&
                 arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((v, x) => {
            if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v;
        });
    });
}

function rotate(matrix) {
    return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function playerRotate() {
    const rotated = rotate(player.matrix);
    const old = player.matrix;
    player.matrix = rotated;
    if (collide(arena, player)) player.matrix = old;
}

function playerReset() {
    player.matrix = createPiece(PIECES[Math.random() * 7 | 0]);
    player.pos.y = 0;
    player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);

    if (collide(arena, player)) {
        running = false;
        overlay.style.display = "block";
        overlay.textContent = "Game Over — Tap to Restart";
        arena.forEach(r => r.fill(0));
    }
}

function draw() {
    ctx.fillStyle = "#0a0f1f";
    ctx.fillRect(0,0,COLS,ROWS);

    arena.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if (v !== 0) {
                ctx.fillStyle = COLORS[v];
                ctx.fillRect(x,y,1,1);
            }
        });
    });

    player.matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if (v !== 0) {
                ctx.fillStyle = COLORS[v];
                ctx.fillRect(x + player.pos.x, y + player.pos.y, 1, 1);
            }
        });
    });
}

let dropCounter = 0;
let dropInterval = 700;
let lastTime = 0;

function update(time = 0) {
    if (!running) return;

    const dt = time - lastTime;
    lastTime = time;
    dropCounter += dt;

    if (!paused && dropCounter > dropInterval) {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            sweep();
            playerReset();
        }
        dropCounter = 0;
    }

    draw();
    requestAnimationFrame(update);
}

function sweep() {
    for (let y = arena.length - 1; y >= 0; y--) {
        if (arena[y].every(v => v !== 0)) {
            arena.splice(y,1);
            arena.unshift(new Array(COLS).fill(0));
            player.score += 100;
        }
    }
    scoreEl.textContent = player.score;
}

function startGame() {
    running = true;
    paused = false;
    overlay.style.display = "none";
    player.score = 0;
    arena.forEach(r => r.fill(0));
    playerReset();
    update();
}

/* -------------------------
   TOUCH BUTTONS
--------------------------*/

document.getElementById("left").onclick = () => {
    player.pos.x--;
    if (collide(arena, player)) player.pos.x++;
};

document.getElementById("right").onclick = () => {
    player.pos.x++;
    if (collide(arena, player)) player.pos.x--;
};

document.getElementById("rotate").onclick = () => playerRotate();

document.getElementById("down").onclick = () => player.pos.y++;

document.getElementById("drop").onclick = () => {
    while (!collide(arena, player)) player.pos.y++;
    player.pos.y--;
    merge(arena, player);
    sweep();
    playerReset();
};

document.getElementById("pause").onclick = () => paused = !paused;

/* Tap to start */
canvas.addEventListener("touchend", () => {
    if (!running) startGame();
});
</script>

</body>
</html>
