<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Mobile Tetris</title>

<style>
    body {
        margin: 0;
        background: #0a0f1f;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 10px;
        color: white;
        overflow: hidden;
    }

    .game {
        width: 100%;
        max-width: 320px;
        text-align: center;
        position: relative;
    }

    #board {
        width: 100%;
        height: auto;
        background: #11172f;
        border-radius: 10px;
        box-shadow: 0 0 15px #00eaff88;
        touch-action: none;
    }

    #overlay {
        position: absolute;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.7);
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 20px;
        display: none;
    }

    .stats {
        margin-top: 10px;
        font-size: 20px;
    }
</style>
</head>

<body>

<div class="game">
    <canvas id="board" width="160" height="320"></canvas>
    <div id="overlay">Tap to Start</div>

    <div class="stats">
        Score: <span id="score">0</span>
    </div>
</div>

<script>
/* -------------------------
   MOBILE TETRIS ENGINE
--------------------------*/

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
ctx.scale(16, 16); // small blocks

const overlay = document.getElementById("overlay");
const scoreEl = document.getElementById("score");

let running = false;
let paused = false;

const COLS = 10;
const ROWS = 20;

const COLORS = {
    1: "#00eaff",
    2: "#ff6bcb",
    3: "#7c3aed",
    4: "#22c55e",
    5: "#facc15",
    6: "#fb923c",
    7: "#38bdf8"
};

const PIECES = "IJLOSTZ";

function createMatrix(w, h) {
    const m = [];
    while (h--) m.push(new Array(w).fill(0));
    return m;
}

function createPiece(type) {
    switch (type) {
        case "T": return [[0,0,0],[1,1,1],[0,1,0]];
        case "O": return [[2,2],[2,2]];
        case "L": return [[0,3,0],[0,3,0],[0,3,3]];
        case "J": return [[0,4,0],[0,4,0],[4,4,0]];
        case "I": return [[5,5,5,5]];
        case "S": return [[0,6,6],[6,6,0],[0,0,0]];
        case "Z": return [[7,7,0],[0,7,7],[0,0,0]];
    }
}

const arena = createMatrix(COLS, ROWS);

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0
};

function collide(arena, player) {
    const m = player.matrix;
    const o = player.pos;
    for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
            if (m[y][x] !== 0 &&
                (arena[y + o.y] &&
                 arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((v, x) => {
            if (v !== 0) arena[y + player.pos.y][x + player.pos.x] = v;
        });
    });
}

function rotate(matrix) {
    return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function playerRotate() {
    const rotated = rotate(player.matrix);
    const old = player.matrix;
    player.matrix = rotated;
    if (collide(arena, player)) player.matrix = old;
}

function playerReset() {
    player.matrix = createPiece(PIECES[Math.random() * 7 | 0]);
    player.pos.y = 0;
    player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);

    if (collide(arena, player)) {
        running = false;
        overlay.style.display = "block";
        overlay.textContent = "Game Over — Tap to Restart";
        arena.forEach(r => r.fill(0));
    }
}

function draw() {
    ctx.fillStyle = "#0a0f1f";
    ctx.fillRect(0,0,COLS,ROWS);

    arena.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if (v !== 0) {
                ctx.fillStyle = COLORS[v];
                ctx.fillRect(x,y,1,1);
            }
        });
    });

    player.matrix.forEach((row,y)=>{
        row.forEach((v,x)=>{
            if (v !== 0) {
                ctx.fillStyle = COLORS[v];
                ctx.fillRect(x + player.pos.x, y + player.pos.y, 1, 1);
            }
        });
    });
}

let dropCounter = 0;
let dropInterval = 600;
let lastTime = 0;

function update(time = 0) {
    if (!running) return;

    const dt = time - lastTime;
    lastTime = time;
    dropCounter += dt;

    if (!paused && dropCounter > dropInterval) {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            sweep();
            playerReset();
        }
        dropCounter = 0;
    }

    draw();
    requestAnimationFrame(update);
}

function sweep() {
    for (let y = arena.length - 1; y >= 0; y--) {
        if (arena[y].every(v => v !== 0)) {
            arena.splice(y,1);
            arena.unshift(new Array(COLS).fill(0));
            player.score += 100;
        }
    }
    scoreEl.textContent = player.score;
}

function startGame() {
    running = true;
    paused = false;
    overlay.style.display = "none";
    player.score = 0;
    arena.forEach(r => r.fill(0));
    playerReset();
    update();
}

/* -------------------------
   SWIPE CONTROLS
--------------------------*/

let startX = 0;
let startY = 0;

canvas.addEventListener("touchstart", e => {
    const t = e.touches[0];
    startX = t.clientX;
    startY = t.clientY;
});

canvas.addEventListener("touchend", e => {
    if (!running) return startGame();

    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    const absX = Math.abs(dx);
    const absY = Math.abs(dy);

    // TAP = rotate
    if (absX < 10 && absY < 10) {
        playerRotate();
        return;
    }

    // Horizontal swipe
    if (absX > absY) {
        if (dx > 0) {
            player.pos.x++;
            if (collide(arena, player)) player.pos.x--;
        } else {
            player.pos.x--;
            if (collide(arena, player)) player.pos.x++;
        }
    }

    // Vertical swipe
    else {
        if (dy > 0) {
            player.pos.y++;
        } else {
            while (!collide(arena, player)) player.pos.y++;
            player.pos.y--;
            merge(arena, player);
            sweep();
            playerReset();
        }
    }
});
</script>

</body>
</html>
